name: CI

# Runs on every push and pull request.
on:
  push:
    branches: [main, development]
  pull_request:

jobs:
  backend:
    name: Backend · build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-manager-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        # Integration tests use an in-memory H2 DB, so no database service is needed.
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp test

  frontend:
    name: Frontend · lint, typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-manager-front
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: task-manager-front/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build
