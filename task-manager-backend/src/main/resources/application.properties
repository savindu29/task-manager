spring.application.name=task-manager-backend

# Server
# ===============================
server.port=${SERVER_PORT:5000}
# Behind the Caddy HTTPS reverse proxy: trust X-Forwarded-* so Spring/Swagger
# build https:// URLs (not http://) and the "Try it out" calls work.
server.forward-headers-strategy=framework

# ===============================
# Datasource (PostgreSQL)
# All DB connection details are REQUIRED env vars (no defaults) - startup fails
# if any are unset. Treated as secrets; never commit real values.
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.issuer=task-manager-backend
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:3600000}

# Authentication Cookie
app.cookie.name=${AUTH_COOKIE_NAME:access_token}
app.cookie.secure=${AUTH_COOKIE_SECURE:false}
app.cookie.http-only=true
app.cookie.same-site=${AUTH_COOKIE_SAMESITE:Lax}
app.cookie.path=/
app.cookie.max-age-seconds=${AUTH_COOKIE_MAX_AGE:3600}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Admin
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.name=${ADMIN_NAME:System Administrator}

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
