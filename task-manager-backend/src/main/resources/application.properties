spring.application.name=task-manager-backend

# ===============================
# Local .env loading (KEY=value)
# Loads a local .env file if present (checked in the module dir and the repo
# root). Parsed as .properties. Optional: absent file is ignored, and real OS
# environment variables always take precedence - so production is unaffected.
# ===============================
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# ===============================
# Server
# ===============================
server.port=${SERVER_PORT:8080}

# ===============================
# Datasource (PostgreSQL)
# All DB connection details are REQUIRED env vars (no defaults) - startup fails
# if any are unset. Treated as secrets; never commit real values.
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT
# JWT_SECRET is a REQUIRED env var (no default). It must be a Base64-encoded
# value of at least 256 bits (32 bytes) for HS256. Startup fails if unset.
# ===============================
app.jwt.secret=${JWT_SECRET}
app.jwt.issuer=task-manager-backend
# Access token lifetime in milliseconds (default 1 hour)
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:3600000}

# ===============================
# Auth cookie (HTTP-only)
# ===============================
app.cookie.name=${AUTH_COOKIE_NAME:access_token}
# Secure=true requires HTTPS. Keep false only for local http development.
app.cookie.secure=${AUTH_COOKIE_SECURE:false}
app.cookie.http-only=true
# SameSite: Strict | Lax | None . Lax is the pragmatic default and mitigates CSRF.
# Use None only with secure=true and a cross-site frontend.
app.cookie.same-site=${AUTH_COOKIE_SAMESITE:Lax}
app.cookie.path=/
# Cookie max-age in seconds (default 1 hour, should match token expiration)
app.cookie.max-age-seconds=${AUTH_COOKIE_MAX_AGE:3600}

# ===============================
# CORS (frontend origins, comma-separated)
# ===============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===============================
# Bootstrap admin (seeded on startup if it does not already exist)
# ADMIN_PASSWORD is a REQUIRED env var (no default). Email/name are not secret.
# ===============================
app.admin.email=${ADMIN_EMAIL:admin@example.com}
app.admin.password=${ADMIN_PASSWORD}
app.admin.name=${ADMIN_NAME:System Administrator}

# ===============================
# OpenAPI / Swagger UI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
